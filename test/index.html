<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page de test — Matthieu Lequimener</title>
  <meta name="description" content="Page de test — dépôt webpages de Matthieu Lequimener." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a08;
      --surface: #121210;
      --accent: #c8f04a;
      --muted: #3a3a36;
      --text: #e8e6de;
      --text-dim: #7a7870;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.35;
    }

    .container {
      max-width: 680px;
      width: 90%;
      padding: 3rem 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      animation: fadeUp 1s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .tag::before {
      content: '';
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
      animation: fadeUp 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--text-dim);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--muted);
      margin: 2rem 0;
      animation: scaleX 1s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      transform-origin: left;
    }

    @keyframes scaleX {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    p {
      font-size: 0.85rem;
      line-height: 1.9;
      color: var(--text-dim);
      max-width: 460px;
      animation: fadeUp 1s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .status {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      animation: fadeUp 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    .corner {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="tag">webpages · test</div>
    <h1>Tout <em>fonctionne</em><br>correctement.</h1>
    <div class="divider"></div>
    <p>
      Ce fichier est une page de test hébergée sur GitHub Pages.
      Il confirme que le dépôt <strong style="color:var(--text)">webpages</strong> est correctement configuré
      et que les pages sont accessibles et indexables.
    </p>
    <div class="status">
      <span class="dot"></span>
      GitHub Pages · actif
    </div>
  </div>

  <div class="corner">matthieulequimener-ux · 2026</div>

</body>
</html>
